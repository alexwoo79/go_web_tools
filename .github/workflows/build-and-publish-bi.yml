name: Build and publish bi image

on:
  push:
    paths:
      - 'bi/**'
      - '.github/workflows/build-and-publish-bi.yml'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        if: secrets.DOCKERHUB_USERNAME && secrets.DOCKERHUB_TOKEN
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (Docker Hub)
        if: secrets.DOCKERHUB_USERNAME && secrets.DOCKERHUB_TOKEN
        uses: docker/build-push-action@v4
        with:
          context: ./bi
          file: ./bi/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/go_form_bi:latest

      - name: Build only (artifact)
        if: !secrets.DOCKERHUB_USERNAME || !secrets.DOCKERHUB_TOKEN
        uses: docker/build-push-action@v4
        with:
          context: ./bi
          file: ./bi/Dockerfile
          push: false
          tags: go_form_bi:local

      - name: Upload image as artifact
        if: !secrets.DOCKERHUB_USERNAME || !secrets.DOCKERHUB_TOKEN
        uses: actions/upload-artifact@v4
        with:
          name: bi-image-tar
          path: |
            image.tar
        # NOTE: To export, you'd need to save the built image to image.tar before this step.
