# 市场营销相关表单
forms:
  - name: "feedback"
    title: "用户反馈表单"
    description: "请告诉我们您的使用体验和建议"
    category: "marketing"
    sort_order: 210
    priority: "high"
    status: "published"
    publish_at: "2026-03-12 09:00:00"
    model:
      table_name: "marketing_feedback"
    fields:
      - name: "name"
        label: "姓名"
        type: "text"
        placeholder: "请输入您的姓名"
        required: true
      - name: "email"
        label: "邮箱"
        type: "email"
        placeholder: "便于回复的邮箱"
        required: true
      - name: "rating"
        label: "满意度评分"
        type: "radio"
        options:
          - "⭐⭐⭐⭐⭐ 非常满意"
          - "⭐⭐⭐⭐ 满意"
          - "⭐⭐⭐ 一般"
          - "⭐⭐ 不满意"
          - "⭐ 非常不满意"
        required: true
      - name: "category"
        label: "反馈类别"
        type: "select"
        options:
          - "功能建议"
          - "问题报告"
          - "使用咨询"
          - "其他"
        required: false
      - name: "content"
        label: "详细内容"
        type: "textarea"
        placeholder: "请详细描述您的想法或遇到的问题..."
        required: true

  - name: "newsletter"
    title: "通讯订阅表单"
    description: "订阅我们的最新资讯和产品动态"
    category: "marketing"
    sort_order: 220
    priority: "medium"
    status: "published"
    publish_at: "2026-03-13 09:00:00"
    model:
      table_name: "marketing_newsletter"
    fields:
      - name: "email"
        label: "邮箱地址"
        type: "email"
        placeholder: "请输入常用邮箱"
        required: true
      - name: "frequency"
        label: "期望接收频率"
        type: "radio"
        options:
          - "每天"
          - "每周"
          - "每月"
        required: false
      - name: "interests"
        label: "感兴趣的内容"
        type: "checkbox"
        options:
          - "产品更新"
          - "技术文章"
          - "行业资讯"
          - "活动通知"
        required: false