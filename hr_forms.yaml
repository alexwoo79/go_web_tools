# 人力资源相关表单
forms:
  - name: "job_application"
    title: "职位申请表"
    description: "请填写职位申请信息"
    category: "hr"
    sort_order: 110
    priority: "high"
    status: "published"
    publish_at: "2026-03-10 09:00:00"
    model:
      table_name: "hr_job_application"
    fields:
      - name: "name"
        label: "姓名"
        type: "text"
        placeholder: "请输入您的姓名"
        required: true
      - name: "email"
        label: "邮箱"
        type: "email"
        placeholder: "个人邮箱"
        required: true
      - name: "phone"
        label: "手机号"
        type: "tel"
        placeholder: "联系电话"
        required: true
      - name: "position"
        label: "申请职位"
        type: "select"
        options:
          - "前端开发工程师"
          - "后端开发工程师"
          - "全栈工程师"
          - "产品经理"
          - "UI/UX 设计师"
        required: true
      - name: "experience"
        label: "工作年限"
        type: "radio"
        options:
          - "应届毕业生"
          - "1-3 年"
          - "3-5 年"
          - "5-10 年"
          - "10 年以上"
        required: true
      - name: "skills"
        label: "技术栈"
        type: "checkbox"
        options:
          - "Go"
          - "Java"
          - "Python"
          - "JavaScript"
          - "React"
          - "Vue"
          - "Node.js"
        required: false
      - name: "resume_url"
        label: "简历链接"
        type: "text"
        placeholder: "请提供在线简历或 GitHub 链接"
        required: false
      - name: "cover_letter"
        label: "求职信"
        type: "textarea"
        placeholder: "请简单介绍一下您为什么适合这个职位..."
        required: false

  - name: "employee_feedback"
    title: "员工意见箱"
    description: "您的每一条建议都让我们变得更好"
    category: "hr"
    sort_order: 120
    priority: "medium"
    status: "published"
    publish_at: "2026-03-11 09:00:00"
    model:
      table_name: "hr_employee_feedback"
    fields:
      - name: "department"
        label: "部门"
        type: "select"
        options:
          - "技术部"
          - "产品部"
          - "设计部"
          - "市场部"
          - "人力资源部"
          - "其他"
        required: true
      - name: "type"
        label: "反馈类型"
        type: "radio"
        options:
          - "工作流程改进"
          - "办公环境改善"
          - "福利待遇建议"
          - "培训发展"
          - "团队建设"
          - "其他"
        required: true
      - name: "anonymous"
        label: "匿名提交"
        type: "checkbox"
        options:
          - "是，请保密我的身份"
        required: false
      - name: "title"
        label: "反馈标题"
        type: "text"
        placeholder: "简短概括您的建议"
        required: true
      - name: "content"
        label: "详细内容"
        type: "textarea"
        placeholder: "请详细描述您的建议..."
        required: true