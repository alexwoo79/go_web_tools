services:
  go-server:
    build: ./go-server
    ports:
      - "8080:8080"
    volumes:
      - ./data/uploads:/data/uploads
    environment:
      - STORAGE_PATH=/data/uploads

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  bi:
    build: ./ops/bi
    ports:
      - "8501:8501"
    volumes:
      - ./ops/bi:/srv/bi
      - ./data/uploads:/data/uploads
    environment:
      - PYTHONUNBUFFERED=1
