services:
  go-server:
    build: ./go-server
    ports:
      - "8080:8080"
    volumes:
      - ./data/uploads:/data/uploads
    environment:
      - STORAGE_PATH=/data/uploads

  shiny-py:
    build: ./ops/shiny_py
    ports:
      - "8000:8000"
      - "3838:8001"
    volumes:
      - ./ops/shiny_py:/srv/shiny_py
      - ./data/uploads:/data/uploads
    environment:
      - PYTHONUNBUFFERED=1

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
