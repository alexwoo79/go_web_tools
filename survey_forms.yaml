# 调研问卷相关表单
forms:
  - name: "customer_satisfaction"
    title: "客户满意度调查"
    description: "帮助我们提升服务质量，完成调查即送优惠券"
    category: "survey"
    sort_order: 410
    priority: "high"
    status: "published"
    publish_at: "2026-03-16 09:00:00"
    expire_at: "2026-12-28"
    model:
      table_name: "survey_customer_satisfaction"
    fields:
      - name: "age_group"
        label: "年龄段"
        type: "radio"
        options:
          - "18 岁以下"
          - "18-25 岁"
          - "26-35 岁"
          - "36-45 岁"
          - "46-60 岁"
          - "60 岁以上"
        required: true
      - name: "usage_frequency"
        label: "使用频率"
        type: "radio"
        options:
          - "每天"
          - "每周几次"
          - "每月几次"
          - "很少使用"
        required: true
      - name: "satisfaction_product"
        label: "产品满意度"
        type: "radio"
        options:
          - "⭐⭐⭐⭐⭐"
          - "⭐⭐⭐⭐"
          - "⭐⭐⭐"
          - "⭐⭐"
          - "⭐"
        required: true
      - name: "satisfaction_service"
        label: "服务满意度"
        type: "radio"
        options:
          - "⭐⭐⭐⭐⭐"
          - "⭐⭐⭐⭐"
          - "⭐⭐⭐"
          - "⭐⭐"
          - "⭐"
        required: true
      - name: "favorite_features"
        label: "最喜欢的功能"
        type: "checkbox"
        options:
          - "界面美观"
          - "操作便捷"
          - "功能完善"
          - "性能稳定"
          - "客服响应快"
          - "性价比高"
        required: false
      - name: "improvement"
        label: "需要改进的地方"
        type: "textarea"
        placeholder: "您的建议对我们很重要..."
        required: false

  - name: "product_research"
    title: "产品需求调研"
    description: "告诉我们您需要什么样的功能"
    category: "survey"
    sort_order: 420
    priority: "medium"
    status: "published"
    publish_at: "2026-03-17 09:00:00"
    model:
      table_name: "survey_product_research"
    fields:
      - name: "role"
        label: "您的职位"
        type: "select"
        options:
          - "开发者"
          - "产品经理"
          - "设计师"
          - "运营人员"
          - "企业管理者"
          - "其他"
        required: true
      - name: "company_size"
        label: "公司规模"
        type: "radio"
        options:
          - "1-20 人"
          - "21-100 人"
          - "101-500 人"
          - "501-1000 人"
          - "1000 人以上"
        required: false
      - name: "needed_features"
        label: "最需要的功能"
        type: "checkbox"
        options:
          - "数据分析报表"
          - "自动化工作流"
          - "团队协作工具"
          - "API 集成"
          - "移动端应用"
          - "自定义表单"
          - "消息通知"
        required: false
      - name: "budget"
        label: "预算范围"
        type: "radio"
        options:
          - "免费"
          - "1000 元以下/年"
          - "1000-5000 元/年"
          - "5000-10000 元/年"
          - "10000 元以上/年"
        required: false
      - name: "timeline"
        label: "预计使用时间"
        type: "select"
        options:
          - "立即使用"
          - "1 个月内"
          - "3 个月内"
          - "半年内"
          - "暂时不需要"
        required: false
      - name: "requirements"
        label: "具体需求描述"
        type: "textarea"
        placeholder: "请详细描述您的业务场景和需求..."
        required: false

  - name: "employee_performance_review"
    title: "员工绩效考核评分"
    description: "模拟公司领导对员工关键能力项进行量化评分"
    category: "survey"
    sort_order: 430
    priority: "medium"
    status: "published"
    publish_at: "2026-03-18 09:00:00"
    expire_at: "2026-12-31"
    model:
      table_name: "survey_employee_performance_review"
    fields:
      - name: "reviewer_name"
        label: "考核人（领导）"
        type: "text"
        placeholder: "请输入考核人姓名"
        required: true
      - name: "employee_name"
        label: "被考核员工"
        type: "text"
        placeholder: "请输入员工姓名"
        required: true
      - name: "department"
        label: "所属部门"
        type: "select"
        options:
          - "研发部"
          - "产品部"
          - "设计部"
          - "运营部"
          - "市场部"
          - "人力资源部"
          - "财务部"
        required: true
      - name: "review_period"
        label: "考核周期"
        type: "select"
        options:
          - "2026 Q1"
          - "2026 Q2"
          - "2026 Q3"
          - "2026 Q4"
          - "年度考核"
        required: true
      - name: "goal_achievement"
        label: "目标达成（0-50）"
        type: "range"
        min: 0
        max: 100
        required: true
      - name: "execution_efficiency"
        label: "执行效率（0-50）"
        type: "range"
        min: 0
        max: 50
        required: true
      - name: "team_collaboration"
        label: "团队协作（0-50）"
        type: "range"
        min: 0
        max: 50
        required: true
      - name: "innovation_capability"
        label: "创新能力（0-50）"
        type: "range"
        min: 0
        max: 50
        required: true
      - name: "professionalism"
        label: "职业素养（0-50）"
        type: "range"
        min: 0
        max: 50
        required: true
      - name: "overall_grade"
        label: "综合评级"
        type: "radio"
        options:
          - "A（优秀）"
          - "B（良好）"
          - "C（合格）"
          - "D（待提升）"
        required: true
      - name: "manager_comment"
        label: "领导评语"
        type: "textarea"
        placeholder: "请填写对员工表现的综合评价与改进建议"
        required: false