<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>表单管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 16px; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        
        /* 顶部用户栏 */
        .user-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 2px solid #e9ecef;
            margin-bottom: 30px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }
        .user-name {
            color: #2c3e50;
            font-weight: 600;
        }
        .user-role {
            background: #667eea;
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: 8px;
        }
        .btn-logout {
            background: #dc3545;
            color: white;
            padding: 8px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn-logout:hover {
            background: #c82333;
            transform: translateY(-2px);
        }

        h1 { color: #2c3e50; margin-bottom: 10px; text-align: center; font-size: 2em; }
        .description { color: #7f8c8d; margin-bottom: 30px; text-align: center; line-height: 1.8; font-size: 1.1em; }
        
        .form-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; margin-top: 30px; }
        .form-card { background: #f8f9fa; border-radius: 12px; padding: 25px; border: 2px solid #e9ecef; transition: all 0.3s; }
        .form-card:hover { transform: translateY(-5px); box-shadow: 0 5px 20px rgba(0,0,0,0.1); border-color: #667eea; }
        .form-card h3 { color: #2c3e50; margin-bottom: 10px; font-size: 1.3em; }
        .form-card p { color: #7f8c8d; margin-bottom: 15px; font-size: 0.95em; }
        .form-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .field-count { background: #667eea; color: white; padding: 5px 12px; border-radius: 20px; font-size: 0.85em; }
        
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { flex: 1; padding: 10px 20px; border: none; border-radius: 8px; font-size: 0.9em; font-weight: 600; cursor: pointer; transition: all 0.3s; text-decoration: none; text-align: center; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102,126,234,0.4); }
        .btn-success { background: linear-gradient(135deg, #28a745 0%, #20c997 100%); color: white; }
        .btn-success:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(40,167,69,0.4); }
        .btn-info { background: linear-gradient(135deg, #17a2b8 0%, #138496 100%); color: white; }
        .btn-info:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(23,162,184,0.4); }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal-content { background: white; margin: 5% auto; padding: 30px; border-radius: 12px; max-width: 95%; width: 1200px; max-height: 80vh; overflow-y: auto; }
        .close { float: right; font-size: 28px; font-weight: bold; cursor: pointer; color: #aaa; }
        .close:hover { color: #000; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #667eea; color: white; font-weight: 600; position: sticky; top: 0; }
        tr:hover { background: #f5f5f5; }
        
        .data-viewer { margin-top: 30px; }
        .loading { text-align: center; padding: 40px; color: #7f8c8d; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 用户信息栏 -->
        {{if .User}}
        <div class="user-bar">
            <div class="user-info">
                <div class="user-avatar">{{index .User.Username 0}}</div>
                <div>
                    <span class="user-name">{{.User.Username}}</span>
                    <span class="user-role">管理员</span>
                </div>
            </div>
            <a href="/logout" class="btn-logout">退出登录</a>
        </div>
        {{end}}

        <h1>📊 表单数据管理系统</h1>
        <p class="description">查看所有表单的提交数据，支持在线查看和导出 CSV 文件</p>

        <div class="form-list">
            {{range .Forms}}
            <div class="form-card">
                <h3>{{.Title}}</h3>
                <p>{{.Description}}</p>
                <div class="form-meta">
                    <span class="field-count">{{.FieldCount}} 个字段</span>
                    <span class="field-count" style="background: linear-gradient(135deg, #28a745 0%, #20c997 100%);">{{.DataCount}} 条数据</span>
                </div>
                <div class="btn-group">
                    <button class="btn btn-info" onclick="viewData('{{.Name}}')">📋 查看数据</button>
                    <button class="btn btn-success" onclick="exportCSV('{{.Name}}')">📥 导出 CSV</button>
                    <a href="/forms/{{.Name}}" class="btn btn-primary" target="_blank">📝 填写表单</a>
                </div>
            </div>
            {{end}}
        </div>
    </div>

    <!-- 数据查看模态框 -->
    <div id="dataModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle"></h2>
            <div id="dataContent" class="data-viewer">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <script>
        function exportCSV(formName) {
            window.location.href = '/api/export/' + formName;
        }

        async function viewData(formName) {
            const modal = document.getElementById('dataModal');
            const modalTitle = document.getElementById('modalTitle');
            const dataContent = document.getElementById('dataContent');
            
            modal.style.display = 'block';
            modalTitle.textContent = '📋 查看数据 - ' + formName;
            dataContent.innerHTML = '<div class="loading">正在加载数据...</div>';

            try {
                const response = await fetch('/api/data/' + formName);
                const result = await response.json();
                
                if (result.status === 'success') {
                    const fields = result.fields;
                    const data = result.data;
                    
                    if (data.length === 0) {
                        dataContent.innerHTML = '<div class="loading">暂无数据</div>';
                        return;
                    }

                    let html = '<table><thead><tr>';
                    // 表头
                    for (let field of fields) {
                        html += `<th>${field.Label}</th>`;
                    }
                    html += '<th>提交时间</th><th>IP 地址</th></tr></thead><tbody>';
                    
                    // 数据行
                    for (let row of data) {
                        html += '<tr>';
                        for (let field of fields) {
                            const value = row[field.Name] || '';
                            html += `<td>${Array.isArray(value) ? value.join(', ') : value}</td>`;
                        }
                        html += `<td>${row._submitted_at || ''}</td>`;
                        html += `<td>${row._ip || ''}</td>`;
                        html += '</tr>';
                    }
                    
                    html += '</tbody></table>';
                    dataContent.innerHTML = html;
                } else {
                    dataContent.innerHTML = '<div class="loading">加载失败：' + result.message + '</div>';
                }
            } catch (err) {
                dataContent.innerHTML = '<div class="loading">网络错误：' + err.message + '</div>';
            }
        }

        function closeModal() {
            document.getElementById('dataModal').style.display = 'none';
        }

        // 点击模态框外部关闭
        window.onclick = function(event) {
            const modal = document.getElementById('dataModal');
            if (event.target === modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
